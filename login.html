<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vant.Ai - Acesso ao Sistema</title>
    <link rel="shortcut icon" href="imagens/new.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html">
            <img src="imagens/ventaiAtivo 3.png" alt="Vant.Ai" width="120">
        </a>
        <nav>
            <ul>
                <li><a href="index.html">Voltar para o Início</a></li>
                <li><a href="cadastro.html">Cadastre-se</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="text-center">
            <h2>Acesse sua Conta</h2>
            <p>Insira seus dados para acessar o gerador de playbooks de vendas.</p>
        </section>

        <div class="form-card">
            <form action="dashboard.html" method="GET">
                <div class="form-group">
                    <label for="email">E-mail corporativo ou acadêmico</label>
                    <input type="email" id="email" name="email" required placeholder="exemplo@novaroma.edu.br">
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" style="width:100%">Entrar na Vant.Ai</button>
                </div>
            </form>

            <div class="form-footer">
                <a href="#">Esqueci minha senha</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Vant.Ai - Sistema de Inteligência Comercial</p>
    </footer>

</body>
</html>
